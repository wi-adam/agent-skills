runtime: claude

reviewer:
  model: codex
  install_prerequisite: |
    Install and authenticate Codex locally. Add Codex as an MCP server in Claude Code:

        claude mcp add codex -- codex mcp-server

    Restart Claude Code after adding the server.
  mechanism: |
    Invoke the MCP tool named `codex` with only `prompt` and `cwd`.
    Do not pass `sandbox` or `approval-policy`; those come from the user's Codex configuration.
    Save the returned `threadId` and use `codex-reply` for follow-up rounds.
  tool_name: codex
  reply_tool_name: codex-reply
  verified:
    date: 2026-04-20
    codex_cli_version: 0.121.0
    server: codex mcp-server

teammate:
  mechanism: TeamCreate + Agent + SendMessage + TeamDelete (built-in)
  spawn_example: 'Agent(subagent_type="implementer-standard", team_name="<team>", name="impl-1", prompt="...")'
  message_example: 'SendMessage(to="impl-1", prompt="...")'
  notes: |
    Implementer and reviewer agent definitions ship with the Claude plugin in `agents/`.
    Reference them by name through `subagent_type`. Before spawning teammates, call
    `TeamCreate(team_name=..., agent_type="team-lead", description=...)` to create the
    shared team container and task list. Every `Agent` spawn MUST pass that
    `team_name` plus a stable `name` (for example `impl-1`, `impl-2`, `reviewer-1`)
    so SendMessage can address the teammate later and the teammate joins the
    shared task list. Without `team_name`, the agent runs as a one-shot outside
    the team. Without `name`, the agent is anonymous and cannot be reused for
    later waves. After the review is published, gracefully shut down teammates
    and call `TeamDelete` to release resources.
